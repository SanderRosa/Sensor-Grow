<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor Grow IoT — Dashboard</title>
    <meta name="description" content="Painel IoT em tempo real para cultivo inteligente. ESP32 + DHT22 + Sensores Capacitivos de Solo.">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #070d07;
            --card:        #0e160e;
            --card-hi:     #121d12;
            --green:       #00e676;
            --green2:      #69f0ae;
            --green-dim:   #00c853;
            --green-dark:  #004d1a;
            --glow:        rgba(0,230,118,0.45);
            --glow-sm:     rgba(0,230,118,0.2);
            --text:        #d4edda;
            --muted:       #3d5c3d;
            --border:      rgba(0,230,118,0.15);
            --border2:     rgba(0,230,118,0.35);
            /* criticidade */
            --warn:        #ffb300;
            --warn-glow:   rgba(255,179,0,0.4);
            --warn-border: rgba(255,179,0,0.35);
            --crit:        #ff5252;
            --crit-glow:   rgba(255,82,82,0.45);
            --crit-border: rgba(255,82,82,0.4);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 0 0 30px;
            background-image:
                radial-gradient(ellipse 80% 40% at 50% 0%, rgba(0,230,118,0.06) 0%, transparent 70%),
                linear-gradient(rgba(0,230,118,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,230,118,0.018) 1px, transparent 1px);
            background-size: 100%, 28px 28px, 28px 28px;
        }

        .app { width: 100%; max-width: 400px; display: flex; flex-direction: column; }

        /* ── HEADER ──────────────────────────────────────────── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 22px 20px 10px;
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #003d14, #00541c);
            border: 1px solid var(--border2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 16px rgba(0,230,118,0.25), inset 0 1px 0 rgba(0,230,118,0.15);
        }
        .logo-icon svg { color: var(--green); filter: drop-shadow(0 0 5px var(--glow)); }
        .logo h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.15rem; font-weight: 700;
            letter-spacing: 1.5px;
            background: linear-gradient(90deg, var(--green2), var(--green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: none;
        }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .pill {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 12px;
            background: rgba(0,230,118,0.07);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
        }
        .pill-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* ── SECTION LABEL ───────────────────────────────────── */
        .sec-label {
            display: flex; align-items: center; gap: 8px;
            padding: 14px 20px 8px;
            font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
        }
        .sec-label::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        /* ── GAUGE GRID ──────────────────────────────────────── */
        .gauge-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 14px;
            margin-bottom: 10px;
        }

        .gauge-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px 10px 14px;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            position: relative; overflow: hidden;
            box-shadow:
                inset 0 1px 0 rgba(0,230,118,0.12),
                inset 0 -1px 0 rgba(0,0,0,0.4),
                0 8px 32px rgba(0,0,0,0.5);
            transition: border-color 0.6s, box-shadow 0.6s;
        }
        /* Cantos decorativos */
        .gauge-card::before, .gauge-card::after {
            content:''; position:absolute; width:14px; height:14px;
            transition: border-color 0.6s;
        }
        .gauge-card::before {
            top:-1px; left:-1px;
            border-top: 2px solid var(--green-dim); border-left: 2px solid var(--green-dim);
            border-radius: 20px 0 0 0;
        }
        .gauge-card::after {
            bottom:-1px; right:-1px;
            border-bottom: 2px solid var(--green-dim); border-right: 2px solid var(--green-dim);
            border-radius: 0 0 20px 0;
        }
        /* Estados de criticidade */
        .gauge-card.warn  { border-color: var(--warn-border); box-shadow: inset 0 1px 0 rgba(255,179,0,0.1), 0 0 24px rgba(255,179,0,0.12); }
        .gauge-card.warn::before, .gauge-card.warn::after { border-color: var(--warn) !important; }
        .gauge-card.crit  { border-color: var(--crit-border); box-shadow: inset 0 1px 0 rgba(255,82,82,0.1), 0 0 24px rgba(255,82,82,0.18); animation: pulse-crit 1.5s ease-in-out infinite; }
        .gauge-card.crit::before, .gauge-card.crit::after { border-color: var(--crit) !important; }
        @keyframes pulse-crit {
            0%,100% { box-shadow: inset 0 1px 0 rgba(255,82,82,0.1), 0 0 24px rgba(255,82,82,0.18); }
            50%      { box-shadow: inset 0 1px 0 rgba(255,82,82,0.15), 0 0 36px rgba(255,82,82,0.32); }
        }
        /* Reflexo de vidro */
        .gauge-card .glass {
            position: absolute; top:0; left:0; right:0; height:40%;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);
            border-radius: 20px 20px 0 0;
            pointer-events: none;
        }

        .gauge-tag {
            font-size: 0.58rem; letter-spacing: 2.5px; text-transform: uppercase;
            color: var(--muted); margin-bottom: 4px;
        }

        /* Badge de status */
        .gauge-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 20px;
            font-size: 0.5rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
            background: rgba(0,230,118,0.1); color: var(--green);
            border: 1px solid rgba(0,230,118,0.25);
            transition: all 0.5s;
        }
        .gauge-badge .bdot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--green); box-shadow: 0 0 5px var(--green);
            transition: background 0.5s, box-shadow 0.5s;
        }
        .gauge-badge.warn  { background: rgba(255,179,0,0.1); color: var(--warn); border-color: rgba(255,179,0,0.3); }
        .gauge-badge.warn .bdot  { background: var(--warn); box-shadow: 0 0 5px var(--warn); }
        .gauge-badge.crit  { background: rgba(255,82,82,0.12); color: var(--crit); border-color: rgba(255,82,82,0.35); }
        .gauge-badge.crit .bdot  { background: var(--crit); box-shadow: 0 0 5px var(--crit); animation: blink 0.8s ease-in-out infinite; }

        /* SVG GAUGE */
        .gauge-svg-wrap { position: relative; width: 148px; height: 148px; }
        .gauge-svg { width: 100%; height: 100%; }

        .gauge-center {
            position: absolute; top:50%; left:50%;
            transform: translate(-50%, -46%);
            text-align: center; pointer-events: none;
        }
        .gauge-num {
            font-family: 'Orbitron', monospace;
            font-size: 2rem; font-weight: 900; line-height: 1;
            color: var(--text);
            text-shadow: 0 0 20px var(--glow), 0 0 8px var(--glow);
            transition: color 0.5s, text-shadow 0.5s;
        }
        .gauge-num.warn { color: var(--warn); text-shadow: 0 0 20px var(--warn-glow), 0 0 8px var(--warn-glow); }
        .gauge-num.crit { color: var(--crit); text-shadow: 0 0 20px var(--crit-glow), 0 0 8px var(--crit-glow); }
        .gauge-unit {
            font-size: 0.7rem; color: var(--muted); margin-top: 2px;
            font-family: 'Rajdhani', sans-serif; letter-spacing: 1px;
        }
        .gauge-hint {
            font-size: 0.58rem; color: var(--muted); letter-spacing: 0.5px;
            text-align: center; margin-top: 2px;
        }

        /* ── SOIL GRID ───────────────────────────────────────── */
        .soil-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 14px;
            margin-bottom: 10px;
        }

        .soil-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 14px 14px 12px;
            position: relative; overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(0,230,118,0.1), 0 6px 20px rgba(0,0,0,0.4);
            transition: border-color 0.6s, box-shadow 0.6s;
        }
        .soil-card::before {
            content:''; position:absolute; top:-1px; left:-1px; width:12px; height:12px;
            border-top: 2px solid var(--green-dim); border-left: 2px solid var(--green-dim);
            border-radius: 18px 0 0 0; transition: border-color 0.6s;
        }
        .soil-card.warn { border-color: var(--warn-border); }
        .soil-card.warn::before { border-color: var(--warn) !important; }
        .soil-card.crit { border-color: var(--crit-border); animation: pulse-crit 1.5s ease-in-out infinite; }
        .soil-card.crit::before { border-color: var(--crit) !important; }

        .soil-name {
            font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase;
            color: var(--green-dim); font-weight: 700; margin-bottom: 1px;
            transition: color 0.5s;
        }
        .soil-card.warn .soil-name { color: var(--warn); }
        .soil-card.crit .soil-name { color: var(--crit); }
        .soil-sub { font-size: 0.5rem; color: var(--muted); margin-bottom: 10px; }

        .soil-big {
            font-family: 'Orbitron', monospace;
            font-size: 1.6rem; font-weight: 900;
            color: var(--text);
            text-shadow: 0 0 14px var(--glow);
            line-height: 1; margin-bottom: 12px;
        }
        .soil-big span { font-size: 0.7rem; color: var(--muted); font-family: 'Rajdhani', sans-serif; }

        /* Thermometer */
        .thermo-row { display: flex; gap: 10px; align-items: flex-end; }
        .thermo-tube {
            width: 20px; height: 80px;
            background: rgba(0,0,0,0.5);
            border: 1.5px solid var(--border2);
            border-radius: 10px;
            position: relative; overflow: hidden; flex-shrink: 0;
        }
        .thermo-fill {
            position: absolute; bottom:0; left:0; width:100%;
            border-radius: 0 0 8px 8px;
            background: linear-gradient(to top, var(--green-dim), var(--green), rgba(105,240,174,0.5));
            box-shadow: 0 -6px 20px var(--glow), 0 -2px 8px rgba(0,230,118,0.6);
            transition: height 1.5s cubic-bezier(.4,0,.2,1);
        }
        .thermo-ticks {
            display: flex; flex-direction: column; justify-content: space-between;
            height: 80px; padding: 2px 0;
        }
        .thermo-tick {
            font-size: 0.42rem; color: var(--muted);
            display: flex; align-items: center; gap: 3px;
        }
        .thermo-tick::before { content:'—'; font-size:0.5rem; }

        /* ── SPARKLINES ──────────────────────────────────────── */
        .spark-card {
            margin: 0 14px 10px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 14px 10px;
            box-shadow: inset 0 1px 0 rgba(0,230,118,0.08);
        }
        .spark-head {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .spark-head-label { font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
        .spark-head-time  { font-size: 0.52rem; color: var(--muted); }
        .spark-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .spark-item { }
        .spark-item svg { width: 100%; height: 44px; }
        .spark-lbl { font-size: 0.52rem; color: var(--muted); text-align: center; margin-top: 3px; }

        /* ── CONTROLS ────────────────────────────────────────── */
        .ctrl-row {
            margin: 0 14px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 14px 10px;
            display: flex; align-items: stretch; justify-content: space-around;
            box-shadow: inset 0 1px 0 rgba(0,230,118,0.08);
            gap: 6px;
        }
        .ctrl-sep { width:1px; align-self: stretch; background: var(--border); }
        .ctrl-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 8px; flex: 1;
        }
        .ctrl-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,230,118,0.08);
            border: 1px solid var(--border);
            transition: background 0.3s, box-shadow 0.3s;
        }
        .ctrl-icon svg { width: 18px; height: 18px; transition: color 0.3s, filter 0.3s; }
        .ctrl-icon.on {
            background: rgba(0,230,118,0.15);
            border-color: var(--border2);
            box-shadow: 0 0 14px rgba(0,230,118,0.2);
        }
        .ctrl-icon.on svg { color: var(--green); filter: drop-shadow(0 0 4px var(--glow)); }
        .ctrl-icon.off svg { color: var(--muted); }
        .toggle {
            width: 38px; height: 20px; border-radius: 10px; cursor: pointer;
            position: relative; transition: background 0.3s, box-shadow 0.3s;
            background: var(--green);
            box-shadow: 0 0 10px var(--glow-sm);
        }
        .toggle::after {
            content:''; position:absolute; top:3px; left:3px;
            width:14px; height:14px; border-radius:50%;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
            transition: left 0.3s cubic-bezier(.4,0,.2,1);
        }
        .toggle.on::after { left: 21px; }
        .toggle.off { background: #1e2e1e; box-shadow: none; }
        .ctrl-val {
            font-size: 0.55rem; color: var(--green); font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            text-shadow: 0 0 6px var(--glow-sm);
        }
        .ctrl-val.off { color: var(--muted); text-shadow: none; }

        /* ── BOTTOM NAV ──────────────────────────────────────── */
        .nav {
            margin: 0 14px;
            background: var(--card-hi);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 14px 20px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: inset 0 1px 0 rgba(0,230,118,0.07), 0 4px 20px rgba(0,0,0,0.4);
        }
        .nav-btn {
            position: relative; display: flex; flex-direction: column;
            align-items: center; gap: 4px;
            color: var(--muted); cursor: pointer; transition: color 0.2s;
        }
        .nav-btn svg { width: 22px; height: 22px; }
        .nav-btn.active { color: var(--green); filter: drop-shadow(0 0 5px var(--glow)); }
        .nav-btn.active::after {
            content:''; position:absolute; bottom:-8px; left:50%;
            transform: translateX(-50%);
            width: 18px; height: 2px;
            background: var(--green);
            border-radius: 1px;
            box-shadow: 0 0 6px var(--green);
        }
    </style>
</head>
<body>
<div class="app">

    <!-- HEADER -->
    <header>
        <div class="logo">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <path d="M9 12l2 2 4-4"/>
                </svg>
            </div>
            <h1>Smart Grow</h1>
        </div>
        <div class="header-right">
            <div class="pill">
                <div class="pill-dot"></div>
                <span id="status-text">Online</span>
            </div>
        </div>
    </header>

    <!-- GAUGES -->
    <div class="sec-label">Ambiente</div>
    <div class="gauge-grid">

        <!-- TEMPERATURA -->
        <div class="gauge-card" id="card-temp">
            <div class="glass"></div>
            <div class="gauge-tag">Temperatura</div>
            <div class="gauge-svg-wrap">
                <svg class="gauge-svg" viewBox="0 0 160 160">
                    <defs>
                        <!-- Gradiente OK -->
                        <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%"   stop-color="#00c853"/>
                            <stop offset="60%"  stop-color="#00e676"/>
                            <stop offset="100%" stop-color="#69f0ae"/>
                        </linearGradient>
                        <!-- Gradiente WARN -->
                        <linearGradient id="arcWarn" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%"   stop-color="#e65100"/>
                            <stop offset="100%" stop-color="#ffb300"/>
                        </linearGradient>
                        <!-- Gradiente CRIT -->
                        <linearGradient id="arcCrit" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%"   stop-color="#b71c1c"/>
                            <stop offset="100%" stop-color="#ff5252"/>
                        </linearGradient>
                        <!-- Filtro glow -->
                        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
                            <feGaussianBlur stdDeviation="3" result="blur"/>
                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                        <filter id="glow-sm" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="1.5" result="blur"/>
                            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                    </defs>

                    <!-- Fundo do arco (track) — 270° -->
                    <circle cx="80" cy="80" r="62"
                        fill="none"
                        stroke="rgba(0,230,118,0.07)"
                        stroke-width="12"
                        stroke-dasharray="294.5 390.0"
                        stroke-dashoffset="-48.5"
                        stroke-linecap="round"
                        transform="rotate(0 80 80)"/>

                    <!-- Arco ativo -->
                    <circle id="arc-temp" cx="80" cy="80" r="62"
                        fill="none"
                        stroke="url(#arcGrad)"
                        stroke-width="12"
                        stroke-dasharray="0 390.0"
                        stroke-dashoffset="-48.5"
                        stroke-linecap="round"
                        transform="rotate(0 80 80)"
                        filter="url(#glow)"
                        style="transition: stroke-dasharray 1.4s cubic-bezier(.4,0,.2,1);"/>

                    <!-- Marcações de escala -->
                    <g id="ticks-temp"></g>

                    <!-- Anel interno decorativo -->
                    <circle cx="80" cy="80" r="48" fill="none" stroke="rgba(0,230,118,0.05)" stroke-width="1"/>
                    <circle cx="80" cy="80" r="38" fill="rgba(0,0,0,0.35)" stroke="rgba(0,230,118,0.06)" stroke-width="1"/>

                    <!-- Ponteiro -->
                    <line id="needle-temp"
                        x1="80" y1="80" x2="80" y2="28"
                        stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"
                        filter="url(#glow)"
                        transform="rotate(-135 80 80)"
                        style="transition: transform 1.4s cubic-bezier(.4,0,.2,1);"/>

                    <!-- Centro do ponteiro -->
                    <circle cx="80" cy="80" r="5.5" fill="#0a0f0a" stroke="var(--green)" stroke-width="2" filter="url(#glow-sm)"/>
                    <circle cx="80" cy="80" r="2" fill="var(--green)" filter="url(#glow)"/>
                </svg>
                <div class="gauge-center">
                    <div class="gauge-num" id="val-temp">--</div>
                    <div class="gauge-unit">°C</div>
                </div>
            </div>
            <div class="gauge-hint">Ideal: 22 – 26 °C</div>
            <div class="gauge-badge" id="badge-temp"><div class="bdot"></div><span id="badge-temp-txt">OK</span></div>
        </div>

        <!-- UMIDADE DO AR -->
        <div class="gauge-card" id="card-umid">
            <div class="glass"></div>
            <div class="gauge-tag">Umidade do Ar</div>
            <div class="gauge-svg-wrap">
                <svg class="gauge-svg" viewBox="0 0 160 160">
                    <!-- Track -->
                    <circle cx="80" cy="80" r="62"
                        fill="none" stroke="rgba(0,230,118,0.07)" stroke-width="12"
                        stroke-dasharray="294.5 390.0" stroke-dashoffset="-48.5"
                        stroke-linecap="round"/>
                    <!-- Arco ativo -->
                    <circle id="arc-umid" cx="80" cy="80" r="62"
                        fill="none" stroke="url(#arcGrad)" stroke-width="12"
                        stroke-dasharray="0 390.0" stroke-dashoffset="-48.5"
                        stroke-linecap="round" filter="url(#glow)"
                        style="transition: stroke-dasharray 1.4s cubic-bezier(.4,0,.2,1);"/>
                    <!-- Marcações -->
                    <g id="ticks-umid"></g>
                    <!-- Rings internos -->
                    <circle cx="80" cy="80" r="48" fill="none" stroke="rgba(0,230,118,0.05)" stroke-width="1"/>
                    <circle cx="80" cy="80" r="38" fill="rgba(0,0,0,0.35)" stroke="rgba(0,230,118,0.06)" stroke-width="1"/>
                    <!-- Ponteiro -->
                    <line id="needle-umid"
                        x1="80" y1="80" x2="80" y2="28"
                        stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"
                        filter="url(#glow)"
                        transform="rotate(-135 80 80)"
                        style="transition: transform 1.4s cubic-bezier(.4,0,.2,1);"/>
                    <!-- Centro -->
                    <circle cx="80" cy="80" r="5.5" fill="#0a0f0a" stroke="var(--green)" stroke-width="2" filter="url(#glow-sm)"/>
                    <circle cx="80" cy="80" r="2" fill="var(--green)" filter="url(#glow)"/>
                </svg>
                <div class="gauge-center">
                    <div class="gauge-num" id="val-umid">--</div>
                    <div class="gauge-unit">%</div>
                </div>
            </div>
            <div class="gauge-hint">Ideal: 60 – 70 %</div>

    <!-- SOLO -->

    <div class="soil-grid">

    <!-- SPARKLINES -->
    <div class="spark-card">
        <div class="spark-head">
            <span class="spark-head-label">Histórico · Solo</span>

        </div>
        <div class="spark-row">
            <div class="spark-item">
                <svg viewBox="0 0 100 44" preserveAspectRatio="none">
                    <defs>
                        <linearGradient id="sg1" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#00e676" stop-opacity="0.35"/>

                    </defs>

    <!-- CONTROLES -->
    <div class="ctrl-row">
        <!-- LUZ LED -->
        <div class="ctrl-item">

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>

            <div class="toggle on" id="t-led" onclick="tog(this,'lbl-led','icon-led','ON','OFF')"></div>

                    <path d="M12 12c2.5 1.5 4 5 2.5 7s-5.5 2-6.5-1c-1-2.5 1-5 4-5z"/>
                    <path d="M12 12c-1.5 2.5-5 4-7 2.5S3 9 6 8c2.5-1 5 1 5 4z"/>
                    <path d="M12 12c-2.5-1.5-4-5-2.5-7s5.5-2 6.5 1c1 2.5-1 5-4 5z"/>

                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>

                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </div>
    </div>

</div>
<script>
// ── Constantes do gauge ─────────────────────────────────────────
// Circunferência completa r=62: 2π×62 = 389.56 ≈ 390
// Arco 270° (3/4): 390 × 0.75 = 292.5
// Offset inicial: deixar "vazio" no fundo — rotacionar -135° via transform (início esquerda-baixo)
const C = 389.56;
const ARC = 292.2; // 270°

// ── Gera marcações de escala ────────────────────────────────────
function buildTicks(svgId, count, cx, cy, r1, r2, rLabel) {
    const g = document.getElementById(svgId);
    if (!g) return;
    const startAngle = -225; // graus (135° abaixo da horizontal esquerda)
    const sweep = 270;
    for (let i = 0; i <= count; i++) {
        const angle = startAngle + (sweep / count) * i;
        const rad = angle * Math.PI / 180;
        const major = i % 5 === 0;
        const x1 = cx + r1 * Math.cos(rad);
        const y1 = cy + r1 * Math.sin(rad);
        const x2 = cx + r2 * Math.cos(rad);
        const y2 = cy + r2 * Math.sin(rad);
        const line = document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        line.setAttribute('stroke', major ? 'rgba(0,230,118,0.5)' : 'rgba(0,230,118,0.18)');
        line.setAttribute('stroke-width', major ? '2' : '1');
        line.setAttribute('stroke-linecap', 'round');
        g.appendChild(line);
    }
}
buildTicks('ticks-temp', 25, 80, 80, 68, major => major ? 74 : 71, 78);
buildTicks('ticks-umid', 25, 80, 80, 68, major => major ? 74 : 71, 78);
// Versão simplificada — passando os raios diretamente
function buildTicksFixed(svgId, count, cx, cy, rOuter, rInner) {
    const g = document.getElementById(svgId);
    if (!g) return;
    const startAngle = -225;
    const sweep = 270;
    for (let i = 0; i <= count; i++) {
        const angle = startAngle + (sweep / count) * i;
        const rad = angle * Math.PI / 180;
        const major = i % 5 === 0;
        const r1 = major ? rOuter : rOuter - 3;
        const r2 = rInner;
        const line = document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1', cx + r1*Math.cos(rad));
        line.setAttribute('y1', cy + r1*Math.sin(rad));
        line.setAttribute('x2', cx + r2*Math.cos(rad));
        line.setAttribute('y2', cy + r2*Math.sin(rad));
        line.setAttribute('stroke', major ? 'rgba(0,230,118,0.55)' : 'rgba(0,230,118,0.2)');
        line.setAttribute('stroke-width', major ? '2' : '1');
        line.setAttribute('stroke-linecap', 'round');
        g.appendChild(line);
    }
}
// Limpa e recria com versão correta
document.getElementById('ticks-temp').innerHTML = '';
document.getElementById('ticks-umid').innerHTML = '';
buildTicksFixed('ticks-temp', 25, 80, 80, 74, 68);
buildTicksFixed('ticks-umid', 25, 80, 80, 74, 68);

// ── Gauge arc e needle ─────────────────────────────────────────
function setArc(el, pct) {
    const f = Math.min(Math.max(pct, 0), 1);
    el.setAttribute('stroke-dasharray', `${ARC * f} ${C}`);
}
function setNeedle(el, pct) {
    const deg = -135 + pct * 270;
    el.setAttribute('transform', `rotate(${deg} 80 80)`);
}

// ── Histórico sparklines ────────────────────────────────────────
const MAX = 20;
const hist = { s1: [], s2: [] };
for (let i = 0; i < MAX-1; i++) {
    hist.s1.push(Math.round(65 + Math.random()*16 - 8));
    hist.s2.push(Math.round(35 + Math.random()*12 - 6));
}

function makePath(arr) {
    if (arr.length < 2) return { l: '', f: '' };
    const step = 100 / (MAX - 1);
    const pts = arr.map((v, i) => `${(i * step).toFixed(1)},${(44 - (v/100)*38).toFixed(1)}`);
    const l = 'M' + pts.join(' L');
    const f = l + ` L100,44 L0,44 Z`;
    return { l, f };
}
function updateSparks() {
    const p1 = makePath(hist.s1); const p2 = makePath(hist.s2);
    document.getElementById('sp1').setAttribute('d', p1.l);
    document.getElementById('sp1f').setAttribute('d', p1.f);
    document.getElementById('sp2').setAttribute('d', p2.l);
    document.getElementById('sp2f').setAttribute('d', p2.f);
}
updateSparks();

// ── Status de criticidade ──────────────────────────────────────
// Retorna 'ok' | 'warn' | 'crit'
function soilStatus(v) {
    if (v <= 30 || v >= 85)         return 'crit';   // extremo
    if (v <= 40 || v >= 80)         return 'warn';   // limiar pedido
    return 'ok';
}
function tempStatus(t) {
    if (t >= 35 || t <= 10)         return 'crit';
    if (t >= 30 || t <= 15)         return 'warn';
    return 'ok';
}
function umidStatus(u) {
    if (u <= 30 || u >= 90)         return 'crit';
    if (u <= 40 || u >= 80)         return 'warn';
    return 'ok';
}

const STATUS_LABELS = { ok: 'OK', warn: 'ATENÇÃO', crit: 'CRÍTICO' };
const ARC_GRAD = { ok: 'url(#arcGrad)', warn: 'url(#arcWarn)', crit: 'url(#arcCrit)' };

function applyGaugeStatus(cardId, numId, arcId, needleId, badgeId, badgeTxtId, status) {
    const card   = document.getElementById(cardId);
    const num    = document.getElementById(numId);
    const arc    = document.getElementById(arcId);
    const needle = document.getElementById(needleId);
    const badge  = document.getElementById(badgeId);
    const btxt   = document.getElementById(badgeTxtId);
    if (!card) return;

    card.className   = 'gauge-card ' + status;
    num.className    = 'gauge-num '  + status;
    if (badge)  badge.className  = 'gauge-badge ' + status;
    if (btxt)   btxt.textContent  = STATUS_LABELS[status];
    if (arc)    arc.setAttribute('stroke', ARC_GRAD[status]);

    // Cor do ponteiro e centro
    const col = status === 'crit' ? 'var(--crit)' : status === 'warn' ? 'var(--warn)' : 'var(--green)';
    if (needle) needle.setAttribute('stroke', col);
}

function applySoilStatus(cardId, nameId, thermoId, status) {
    const card  = document.getElementById(cardId);
    const therm = document.getElementById(thermoId);
    if (card)  card.className  = 'soil-card ' + status;
    const col = status === 'crit' ? 'var(--crit)' : status === 'warn' ? 'var(--warn)' : 'var(--green-dim)';
    if (therm) {
        therm.style.background = status === 'crit'
            ? 'linear-gradient(to top, #b71c1c, #ff5252, rgba(255,82,82,0.4))'
            : status === 'warn'
            ? 'linear-gradient(to top, #e65100, #ffb300, rgba(255,179,0,0.4))'
            : 'linear-gradient(to top, var(--green-dim), var(--green), rgba(105,240,174,0.5))';
        therm.style.boxShadow = status === 'crit'
            ? '0 -6px 20px rgba(255,82,82,0.5)'
            : status === 'warn'
            ? '0 -6px 20px rgba(255,179,0,0.4)'
            : '0 -6px 20px var(--glow)';
    }
}
function setValues(t, u, s1, s2) {
    t = parseFloat(t)||0; u = parseFloat(u)||0;
    s1 = parseInt(s1)||0; s2 = parseInt(s2)||0;

    document.getElementById('val-temp').textContent = t.toFixed(1);
    document.getElementById('val-umid').textContent = u.toFixed(1);
    document.getElementById('val-soil1').innerHTML = s1 + ' <span>%</span>';
    document.getElementById('val-soil2').innerHTML = s2 + ' <span>%</span>';

    setArc(document.getElementById('arc-temp'), t / 50);
    setArc(document.getElementById('arc-umid'), u / 100);
    setNeedle(document.getElementById('needle-temp'), t / 50);
    setNeedle(document.getElementById('needle-umid'), u / 100);

    document.getElementById('thermo-s1').style.height = Math.min(s1, 100) + '%';
    document.getElementById('thermo-s2').style.height = Math.min(s2, 100) + '%';

    // Criticidade
    applyGaugeStatus('card-temp','val-temp','arc-temp','needle-temp','badge-temp','badge-temp-txt', tempStatus(t));
    applyGaugeStatus('card-umid','val-umid','arc-umid','needle-umid','badge-umid','badge-umid-txt', umidStatus(u));
    applySoilStatus('card-s1', null, 'thermo-s1', soilStatus(s1));
    applySoilStatus('card-s2', null, 'thermo-s2', soilStatus(s2));

    hist.s1.push(s1); hist.s2.push(s2);
    if (hist.s1.length > MAX) hist.s1.shift();
    if (hist.s2.length > MAX) hist.s2.shift();
    updateSparks();
}

// ── Simulação ───────────────────────────────────────────────────
function sim() {
    setValues(
        (23.5 + Math.random()*3).toFixed(1),
        (63   + Math.random()*7).toFixed(1),
        Math.round(70 + Math.random()*8 - 4),
        Math.round(38 + Math.random()*6 - 4)
    );
}

function refresh() {
    fetch('/data', { signal: AbortSignal.timeout(2000) })
        .then(r => r.json())
        .then(d => { document.getElementById('status-text').textContent = 'ESP32 Online'; setValues(d.temp, d.umid, d.solo1, d.solo2); })
        .catch(() => { document.getElementById('status-text').textContent = 'Simulação'; sim(); });
}

// ── Toggle controles ────────────────────────────────────────────
function tog(el, lblId, iconId, onTxt, offTxt) {
    el.classList.toggle('on'); el.classList.toggle('off');
    const on = el.classList.contains('on');
    const lbl = document.getElementById(lblId);
    lbl.textContent = on ? onTxt : offTxt;
    lbl.className = 'ctrl-val' + (on ? '' : ' off');
    const icon = document.getElementById(iconId);
    if (icon) { icon.className = 'ctrl-icon ' + (on ? 'on' : 'off'); }
}

// ── Inicia ──────────────────────────────────────────────────────
refresh();
setInterval(refresh, 3000);
</script>
