<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sander's Holo-Tech Grow</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #040814;
            --card-bg: #081224;
            --cyan: #00f3ff;
            --cyan-glow: rgba(0, 243, 255, 0.5);
            --green: #0de07d;
            --green-glow: rgba(13, 224, 125, 0.4);
            --yellow: #ffea00;
            --red: #ff3366;
            --text-main: #e0f7fa;
            --text-muted: #5e849c;
            --border-glow: rgba(0, 243, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
            background-image:
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .phone-mockup {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 20px;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5px;
        }

        .icon-btn {
            color: var(--cyan);
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.1);
        }

        .status-pill {
            font-size: 0.9rem;
            color: var(--green);
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 8px var(--green-glow);
        }

        /* CARDS GERAIS */
        .holo-card {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 15px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.05), 0 5px 15px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        /* Cantos Holográficos */
        .holo-card::before,
        .holo-card::after {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
        }

        .holo-card::before {
            top: -1px;
            left: -1px;
            border-top: 2px solid var(--cyan);
            border-left: 2px solid var(--cyan);
            border-radius: 12px 0 0 0;
        }

        .holo-card::after {
            bottom: -1px;
            right: -1px;
            border-bottom: 2px solid var(--cyan);
            border-right: 2px solid var(--cyan);
            border-radius: 0 0 12px 0;
        }

        /* SEÇÃO 1: ISO CUBE & MINIS */
        .top-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 12px;
        }

        .iso-box {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 160px;
            position: relative;
        }

        .iso-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 5px var(--cyan-glow));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        .mini-stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .mini-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 8px;
            padding: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .mini-card-title {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .mini-card-val {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--cyan);
            text-shadow: 0 0 8px var(--cyan-glow);
        }

        .mini-card-bg {
            position: absolute;
            right: -10px;
            bottom: -10px;
            opacity: 0.2;
            width: 50px;
        }

        /* SEÇÃO 2: MIDDLE CHART */
        .mid-section {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 15px;
            align-items: center;
        }

        .dome-svg {
            width: 100%;
            filter: drop-shadow(0 0 5px var(--green-glow));
        }

        .chart-container {
            width: 100%;
            height: 80px;
            position: relative;
        }

        .chart-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .chart-line {
            fill: none;
            stroke: var(--cyan);
            stroke-width: 2;
            filter: drop-shadow(0 0 4px var(--cyan-glow));
        }

        .chart-fill {
            fill: url(#cyanGrad);
            opacity: 0.3;
        }

        .chart-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.6rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* SEÇÃO 3: RINGS & LEGEND */
        .bot-grid {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 20px;
            align-items: center;
        }

        .rings-container {
            position: relative;
            width: 120px;
            height: 120px;
        }

        .ring-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.05);
        }

        .ring-prog {
            fill: none;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .ring-center-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--cyan);
            filter: drop-shadow(0 0 5px var(--cyan-glow));
        }

        .legend-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .legend-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* GALERIA DE HARDWARE */
        .hw-title {
            font-size: 0.8rem;
            color: var(--cyan);
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hw-title::before {
            content: '';
            width: 5px;
            height: 5px;
            background: var(--cyan);
        }

        .hw-grid {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: thin;
            scrollbar-color: var(--cyan) transparent;
        }

        .hw-item {
            min-width: 70px;
            height: 70px;
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            position: relative;
            background: #000;
            flex-shrink: 0;
            overflow: hidden;
        }

        .hw-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            filter: sepia(1) hue-rotate(150deg) saturate(2);
            transition: 0.3s;
        }

        .hw-item:hover img {
            opacity: 1;
            filter: none;
        }

        .hw-tag {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0, 243, 255, 0.7);
            color: #000;
            font-size: 0.5rem;
            text-align: center;
            font-weight: 700;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            padding: 12px 20px;
            margin-top: auto;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            color: var(--text-muted);
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-icon.active {
            color: var(--green);
            filter: drop-shadow(0 0 5px var(--green-glow));
        }
    </style>
</head>

<body>

    <div class="phone-mockup">

                    </path>

        <!-- TOP GRID (Cubo e Valores dos Vasos) -->

                    <path d="M85 35 L50 55 L50 95 L85 75 Z" fill="rgba(0, 243, 255, 0.08)" stroke="var(--cyan)"
                        stroke-width="1" />
                    <!-- Planta Interna -->
                    <path d="M50 85 Q45 60 50 30" fill="none" stroke="var(--green)" stroke-width="2"
                        stroke-linecap="round" />
                    <path d="M50 65 Q35 60 30 45" fill="none" stroke="var(--green)" stroke-width="1.5"
                        stroke-linecap="round" />
                    <path d="M50 55 Q65 50 70 35" fill="none" stroke="var(--green)" stroke-width="1.5"

        <!-- MIDDLE SECTION (Gráfico e Dome) -->

            <div class="dome-container">
                <svg class="dome-svg" viewBox="0 0 100 100">
                    <!-- Dome Base -->

            </div>

        <!-- BOTTOM SECTION (Rings & Legends) -->

            <div class="rings-container">
                <svg class="ring-svg" viewBox="0 0 100 100">

                    <circle id="ring-soil2" class="ring-prog" cx="50" cy="50" r="10" stroke-width="4"

                <div class="ring-center-icon">

                    </svg>
                </div>
            </div>

            <div class="legend-list">
                <div class="legend-item">
                    <div class="legend-label">
                        <div class="legend-dot" style="background: var(--cyan);"></div> Temperature
                    </div>
                    <div style="color: var(--cyan);" id="val-temp">--</div>
                </div>
                <div class="legend-item">
                    <div class="legend-label">
                        <div class="legend-dot" style="background: var(--green);"></div> Humidity
                    </div>
                    <div style="color: var(--green);" id="val-umid">--</div>
                </div>
                <div class="legend-item">
                    <div class="legend-label">
                        <div class="legend-dot" style="background: var(--yellow);"></div> Soil Pot 1
                    </div>
                    <div style="color: var(--yellow);" id="val-s1">--</div>
                </div>
                <div class="legend-item">

                        <div class="legend-dot" style="background: var(--red);"></div> Soil Pot 2
                    </div>
                    <div style="color: var(--red);" id="val-s2">--</div>
                </div>
            </div>

        <div class="bottom-nav">

    </div>

    <script>
        function setValues(t, u, s1, s2) {
            t = parseFloat(t); u = parseFloat(u);
            s1 = parseInt(s1); s2 = parseInt(s2);

            // Textos com unidade correta
            document.getElementById('val-temp').innerText = t.toFixed(1) + '\u00B0C';
            document.getElementById('val-umid').innerText = u.toFixed(1) + '%';
            document.getElementById('soil1-text').innerText = s1 + '%';
            document.getElementById('soil2-text').innerText = s2 + '%';
            document.getElementById('val-s1').innerText = s1 + '%';
            document.getElementById('val-s2').innerText = s2 + '%';

            // Anima Rings (C = 2*PI*r)
            // Ring Temp:  r=40, C=251.2, escala max 50C
            document.getElementById('ring-temp').style.strokeDashoffset = 251.2 - (251.2 * Math.min(t / 50, 1));
            // Ring Umid:  r=30, C=188.5, escala max 100%
            document.getElementById('ring-umid').style.strokeDashoffset = 188.5 - (188.5 * Math.min(u / 100, 1));
            // Ring Solo1: r=20, C=125.6
            document.getElementById('ring-soil1').style.strokeDashoffset = 125.6 - (125.6 * Math.min(s1 / 100, 1));
            // Ring Solo2: r=10, C=62.8
            document.getElementById('ring-soil2').style.strokeDashoffset = 62.8 - (62.8 * Math.min(s2 / 100, 1));
        }

        // Preview local: simula com precis\u00e3o real dos sensores
        function simular() {
            const t = (23.5 + Math.random() * 3).toFixed(1);
            const u = (63.0 + Math.random() * 7).toFixed(1); // 1 decimal
            const s1 = Math.max(0, Math.min(100, Math.round(70 + Math.random() * 8 - 4)));
            const s2 = Math.max(0, Math.min(100, Math.round(38 + Math.random() * 6 - 4)));
            setValues(t, u, s1, s2);
        }

        // Tenta buscar dados reais do ESP32 via /data; se falhar, simula
        function atualizar() {
            fetch('/data', { signal: AbortSignal.timeout(2000) })
                .then(r => r.json())
                .then(d => setValues(d.temp, d.umid, d.solo1, d.solo2))
                .catch(() => simular()); // sem conexao: usa simulacao
        }

        // Primeira carga + ciclo de 3s (mesmo intervalo do servidor)
        atualizar();
        setInterval(atualizar, 3000);
    </script>
